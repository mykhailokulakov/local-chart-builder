name: CI
on:
  push:
    branches: [main]
  pull_request:
# Suppress DEP0040: actions/setup-node post-run cleanup uses uri-js (via
# ajv@6) which imports the deprecated built-in `punycode` on Node 22.
# Remove once actions/setup-node drops the ajv@6 dependency.
env:
  NODE_OPTIONS: --no-deprecation
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
