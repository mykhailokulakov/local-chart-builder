name: CI
on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
  workflow_dispatch:
# Suppress DEP0040: actions/setup-node post-run cleanup uses uri-js (via
# ajv@6) which imports the deprecated built-in `punycode` on Node 22.
# Remove once actions/setup-node drops the ajv@6 dependency.
env:
  NODE_OPTIONS: --no-deprecation
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Determine tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: derive version from package.json
            echo "value=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate changelog
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          {
            FEATS=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -E "^feat(\([^)]+\))?: " \
              | sed -E 's/^feat(\([^)]+\))?: /- /' || true)
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -E "^fix(\([^)]+\))?: " \
              | sed -E 's/^fix(\([^)]+\))?: /- /' || true)
            OTHERS=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -vE "^(feat|fix)(\([^)]+\))?: " \
              | grep -vE "^Merge " || true)

            if [[ -n "$FEATS" ]]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [[ -n "$OTHERS" ]]; then
              echo "### Other Changes"
              echo "$OTHERS" | sed 's/^/- /'
              echo ""
            fi
            if [[ -n "$COMPARE_URL" ]]; then
              echo "**Full Changelog**: ${COMPARE_URL}"
            fi
          } > changelog.md
      - name: Zip dist
        run: zip -r "report-builder-${{ steps.tag.outputs.value }}.zip" dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          body_path: changelog.md
          files: report-builder-${{ steps.tag.outputs.value }}.zip
