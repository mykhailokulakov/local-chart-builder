name: CI
on:
  push:
    branches: [main]
  pull_request:
# Suppress DEP0040: actions/setup-node post-run cleanup uses uri-js (via
# ajv@6) which imports the deprecated built-in `punycode` on Node 22.
# Remove once actions/setup-node drops the ajv@6 dependency.
env:
  NODE_OPTIONS: --no-deprecation
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # Produce a full JSON report regardless of outcome so it is always
      # available as a downloadable artifact for triage.
      - name: Generate vulnerability report
        run: npm audit --json > audit-report.json || true
      # Hard-fail the job only on critical-severity findings — these represent
      # actively exploitable vulnerabilities that require an immediate update.
      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=critical
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:coverage
      # Render a per-file coverage table directly in the job summary so it is
      # visible on the Actions run page without downloading any artifact.
      - uses: davelosert/vitest-coverage-report-action@v2
        if: always()
      # Upload the full HTML coverage report for browsable line-level detail.
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # Download the dist artifact built in the build job so we test the exact
      # same output that gets released — not a fresh rebuild.
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      # Upload the HTML report on failure so the team can inspect screenshots
      # and traces without re-running locally.
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
