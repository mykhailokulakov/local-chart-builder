name: CI
on:
  push:
    branches: [main]
  pull_request:
# Suppress DEP0040: actions/setup-node post-run cleanup uses uri-js (via
# ajv@6) which imports the deprecated built-in `punycode` on Node 22.
# Remove once actions/setup-node drops the ajv@6 dependency.
env:
  NODE_OPTIONS: --no-deprecation
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # Download the dist artifact built in the build job so we test the exact
      # same output that gets released — not a fresh rebuild.
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      # Upload the HTML report on failure so the team can inspect screenshots
      # and traces without re-running locally.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
