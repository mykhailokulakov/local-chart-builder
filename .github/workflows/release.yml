name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
# Suppress DEP0040: actions/setup-node post-run cleanup uses uri-js (via
# ajv@6) which imports the deprecated built-in `punycode` on Node 22.
# Remove once actions/setup-node drops the ajv@6 dependency.
env:
  NODE_OPTIONS: --no-deprecation
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          # Use a PAT if your main branch is protected and requires
          # status checks — GITHUB_TOKEN can push but won't bypass rules.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download dist artifact from latest passing CI on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --branch main \
            --workflow ci.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "::error::No successful CI run found on main. Merge and wait for CI to pass first."
            exit 1
          fi

          echo "Using artifact from CI run $RUN_ID"
          gh run download "$RUN_ID" --name dist --dir dist/

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_TAG="v$(node -p "require('./package.json').version")"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          {
            FEATS=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -E "^feat(\([^)]+\))?: " \
              | sed -E 's/^feat(\([^)]+\))?: /- /' || true)
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -E "^fix(\([^)]+\))?: " \
              | sed -E 's/^fix(\([^)]+\))?: /- /' || true)
            OTHERS=$(git log "$RANGE" --pretty=format:"%s" --no-merges \
              | grep -vE "^(feat|fix)(\([^)]+\))?: " \
              | grep -vE "^Merge " || true)

            if [[ -n "$FEATS" ]]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [[ -n "$OTHERS" ]]; then
              echo "### Other Changes"
              echo "$OTHERS" | sed 's/^/- /'
              echo ""
            fi
            if [[ -n "$COMPARE_URL" ]]; then
              echo "**Full Changelog**: ${COMPARE_URL}"
            fi
          } > changelog.md

      - name: Commit version bump, tag, and push
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${TAG}"
          git tag "${TAG}"
          git push origin main
          git push origin "${TAG}"

      - name: Zip dist artifact
        run: zip -r "report-builder-${{ steps.version.outputs.tag }}.zip" dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file changelog.md \
            "report-builder-${{ steps.version.outputs.tag }}.zip"
